---
layout: default
---
<article class="blog-post container about-prose">
  <h1 class="display-4">{{ page.title }}</h1>
  <p class="lead text-muted">{{ page.date | date: "%B %d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  <div class="blog-post-content">
    {{ content }}
  </div>
</article>
