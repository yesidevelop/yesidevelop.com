<header id="header" class="header ai-header dark-background d-flex align-items-center sticky-top">
    <div class="container-fluid position-relative d-flex align-items-center justify-content-between">

      <a href="/" class="logo d-flex align-items-center me-auto me-xl-0">
        <div>
          <h1 class="sitename mb-0"><span class="logo-accent">Ali</span> Mehdi</h1>
          <span class="logo-tagline">{{ site.role }}</span>
        </div>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="/" class="active">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/blog">Blog</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <div class="header-social-links">
        <a href="https://twitter.com/{{ site.twitter_username }}" class="twitter" target="_blank" rel="noopener" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
        <a href="https://github.com/{{ site.github_username }}" class="github" target="_blank" rel="noopener" aria-label="GitHub"><i class="bi bi-github"></i></a>
        <a href="mailto:{{ site.email }}" class="email" aria-label="Email"><i class="bi bi-envelope"></i></a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" class="linkedin" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
      </div>

    </div>
  </header>
